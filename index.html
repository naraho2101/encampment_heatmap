<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 20 Encampment Sites — Seattle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
    line-height: 1.5;
    color: #FFFFFF;
    background: transparent;
    padding: 24px;
  }
  main { max-width: 1400px; margin: 0 auto; }

  .scroll-wrap {
    overflow-x: auto;
    margin: 0 -24px;
    padding: 0 24px 4px;
    -webkit-overflow-scrolling: touch;
  }

  #heatmap {
    display: grid;
    grid-template-columns: 240px 60px repeat(4, minmax(80px, 1fr));
    gap: 2px;
    min-width: 640px;
  }

  .cell {
    padding: 10px 12px;
    font-size: 12px;
    min-height: 36px;
    display: flex;
    align-items: center;
  }

  /* Header row — all white */
  .h {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #FFFFFF;
    font-weight: 500;
    padding: 6px 12px 10px;
    background: transparent;
    border-bottom: 1px solid rgba(255,255,255,0.18);
  }
  .h-label   { justify-content: flex-start; }
  .h-reports { justify-content: flex-end; }
  .h-util    { justify-content: center; }

  /* Site + Reports cells — beige row-header lane */
  .label-cell {
    background: #F5F4EE;
    color: #2C2C2A;
    justify-content: flex-start;
    gap: 6px;
  }
  .rank { color: #888780; font-variant-numeric: tabular-nums; }
  .name { color: #2C2C2A; }
  .reports-cell {
    background: #F5F4EE;
    color: #2C2C2A;
    justify-content: flex-end;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  /* Utility (distance) cells */
  .util-cell {
    justify-content: center;
    font-variant-numeric: tabular-nums;
    position: relative;
    cursor: default;
    transition: filter 120ms ease;
  }

  /* Row hover — added to every cell sharing the same data-row */
  .cell.row-hover {
    filter: brightness(1.10);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
  }

  /* Legend */
  .legend {
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: #FFFFFF;
    flex-wrap: wrap;
  }
  .legend .grad {
    flex: 1 1 220px;
    height: 10px;
    border-radius: 2px;
    background: linear-gradient(to right,
      #293B36 0%, #37534B 12%, #466D62 25%, #559180 40%,
      #78B0A0 58%, #A8C7BE 75%, #D0DDD9 88%, #E8EDEC 100%);
    min-width: 160px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .legend .hint {
    color: rgba(255,255,255,0.6);
    margin-left: 4px;
    font-variant-numeric: tabular-nums;
  }

  @media (max-width: 600px) {
    body { padding: 16px; }
    .scroll-wrap { margin: 0 -16px; padding: 0 16px 4px; }
  }
</style>
</head>
<body>
<main>
  <div class="scroll-wrap">
    <div id="heatmap" role="table"
         aria-label="Top 20 encampment sites and their walking distance to nearest transit, park, food resource, and shelter"></div>
  </div>

  <div class="legend" aria-hidden="true">
    <span>Closer</span>
    <div class="grad"></div>
    <span>Farther</span>
    <span class="hint">0 → 1.5 mi+</span>
  </div>
</main>

<script>
const sites = [
  { rank: 1,  label: "Capitol Hill — Broadway E",          reports: 6627, Transit: 70,  Food: 25,  Park: 212, Shelter: 800  },
  { rank: 2,  label: "Belltown — 2nd Ave",                 reports: 5817, Transit: 67,  Food: 128, Park: 99,  Shelter: 167  },
  { rank: 3,  label: "Ballard — NW Leary Way",             reports: 5240, Transit: 7,   Food: 207, Park: 369, Shelter: 738  },
  { rank: 4,  label: "Capitol Hill — 11th Ave",            reports: 5177, Transit: 249, Food: 490, Park: 113, Shelter: 583  },
  { rank: 5,  label: "Olympic Hills — NE 125th St",        reports: 4758, Transit: 13,  Food: 77,  Park: 90,  Shelter: 699  },
  { rank: 6,  label: "Ballard — NW 51st St",               reports: 4734, Transit: 209, Food: 311, Park: 606, Shelter: 237  },
  { rank: 7,  label: "Ballard — 22nd Ave NW",              reports: 4286, Transit: 77,  Food: 192, Park: 116, Shelter: 468  },
  { rank: 8,  label: "Ballard — NW Market St",             reports: 4246, Transit: 36,  Food: 538, Park: 159, Shelter: 687  },
  { rank: 9,  label: "Pioneer Square — Occidental Ave S",  reports: 3834, Transit: 84,  Food: 107, Park: 71,  Shelter: 65   },
  { rank: 10, label: "Central Area — 17th Ave",            reports: 3825, Transit: 110, Food: 164, Park: 207, Shelter: 823  },
  { rank: 11, label: "Queen Anne — Mercer St",             reports: 3340, Transit: 38,  Food: 450, Park: 144, Shelter: 167  },
  { rank: 12, label: "Licton Springs — Aurora Ave N",      reports: 3258, Transit: 128, Food: 186, Park: 507, Shelter: 3430 },
  { rank: 13, label: "Fremont — NW 44th St",               reports: 3093, Transit: 62,  Food: 704, Park: 366, Shelter: 1248 },
  { rank: 14, label: "Greenwood — NW 87th St",             reports: 3082, Transit: 181, Food: 717, Park: 330, Shelter: 3187 },
  { rank: 15, label: "First Hill — Boylston Ave",          reports: 2822, Transit: 35,  Food: 315, Park: 197, Shelter: 545  },
  { rank: 16, label: "Mt. Baker — S Hill St",              reports: 2814, Transit: 62,  Food: 172, Park: 342, Shelter: 1673 },
  { rank: 17, label: "Green Lake — 8th Ave NE",            reports: 2736, Transit: 64,  Food: 85,  Park: 544, Shelter: 1410 },
  { rank: 18, label: "Broadview — Aurora Ave N",           reports: 2669, Transit: 189, Food: 401, Park: 434, Shelter: 294  },
  { rank: 19, label: "Capitol Hill — Bellevue Ave E",      reports: 2632, Transit: 52,  Food: 321, Park: 122, Shelter: 224  },
  { rank: 20, label: "North Beacon Hill — 15th Ave S",     reports: 2427, Transit: 70,  Food: 694, Park: 21,  Shelter: 457  },
];

const UTILS = ["Transit", "Park", "Food", "Shelter"];

// 8-bucket scale anchored on base #293B36 — lifts from dark teal to pale mist.
function colorFor(m) {
  if (m < 100)  return "#293B36";  // closest
  if (m < 200)  return "#37534B";
  if (m < 400)  return "#466D62";
  if (m < 600)  return "#559180";
  if (m < 1000) return "#78B0A0";
  if (m < 1500) return "#A8C7BE";
  if (m < 2500) return "#D0DDD9";
  return "#E8EDEC";                 // farthest
}
// Light text on the three darkest buckets; near-black on the rest (WCAG AA on every cell).
function textColorFor(m) { return m < 400 ? "#E8EDEC" : "#0A1612"; }
const M_PER_FT = 0.3048;
const M_PER_MI = 1609.344;
function formatDistance(meters) {
  const miles = meters / M_PER_MI;
  if (miles < 0.1) {
    return `${Math.round((meters / M_PER_FT) / 10) * 10} ft`;
  }
  return `${(Math.ceil(miles * 10) / 10).toFixed(1)} mi`;
}

const grid = document.getElementById("heatmap");

function makeHeader(text, cls) {
  const el = document.createElement("div");
  el.className = "cell h " + cls;
  el.setAttribute("role", "columnheader");
  el.textContent = text;
  return el;
}
grid.append(
  makeHeader("Site",    "h-label"),
  makeHeader("Reports", "h-reports"),
  ...UTILS.map(u => makeHeader(u, "h-util"))
);

sites.forEach((s, i) => {
  const rowId = "r" + i;

  const labelCell = document.createElement("div");
  labelCell.className = "cell label-cell";
  labelCell.dataset.row = rowId;
  labelCell.setAttribute("role", "cell");
  labelCell.innerHTML =
    '<span class="rank">' + String(s.rank).padStart(2, "0") + '</span>' +
    '<span class="name">' + s.label + '</span>';
  grid.appendChild(labelCell);

  const reportsCell = document.createElement("div");
  reportsCell.className = "cell reports-cell";
  reportsCell.dataset.row = rowId;
  reportsCell.setAttribute("role", "cell");
  reportsCell.textContent = s.reports.toLocaleString();
  grid.appendChild(reportsCell);

  UTILS.forEach(u => {
    const m = s[u];
    const cell = document.createElement("div");
    cell.className = "cell util-cell";
    cell.dataset.row = rowId;
    cell.style.background = colorFor(m);
    cell.style.color = textColorFor(m);
    cell.setAttribute("role", "cell");
    cell.textContent = formatDistance(m);
    grid.appendChild(cell);
  });
});

// Row hover: shared class applied to all cells with the same data-row
grid.addEventListener("mouseover", e => {
  const cell = e.target.closest(".cell[data-row]");
  if (!cell) return;
  const row = cell.dataset.row;
  grid.querySelectorAll('.cell[data-row="' + row + '"]').forEach(c => c.classList.add("row-hover"));
});
grid.addEventListener("mouseout", e => {
  const cell = e.target.closest(".cell[data-row]");
  if (!cell) return;
  const row = cell.dataset.row;
  grid.querySelectorAll('.cell[data-row="' + row + '"]').forEach(c => c.classList.remove("row-hover"));
});
</script>
</body>
</html>
